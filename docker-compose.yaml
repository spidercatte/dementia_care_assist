services:
  db:
    image: postgres:15-alpine
    container_name: dementia-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dementia_care
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always

  rag:
    image: chromadb/chroma:0.4.24
    container_name: dementia-rag
    ports:
      - "8001:8000"
    volumes:
      - rag-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dementia-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:password@db:5432/dementia_care
      - CHROMA_SERVER_HOST=rag
      - CHROMA_SERVER_PORT=8000
      - BACKEND_PUBLIC_URL=http://localhost:8000
    depends_on:
      - db
      - rag
    restart: always

  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    container_name: dementia-mcp
    ports:
      - "8002:8002"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8002
      - DATABASE_URL=postgresql://postgres:password@db:5432/dementia_care
      - CHROMA_SERVER_HOST=rag
      - CHROMA_SERVER_PORT=8000
      - VERTEX_SEARCH_PROJECT_ID=${VERTEX_SEARCH_PROJECT_ID}
      - VERTEX_SEARCH_LOCATION=${VERTEX_SEARCH_LOCATION}
      - VERTEX_SEARCH_DATASTORE_ID=${VERTEX_SEARCH_DATASTORE_ID}
      - VERTEX_PATIENT_DATASTORE_ID=${VERTEX_PATIENT_DATASTORE_ID}
    depends_on:
      - db
      - rag
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=http://localhost:8000
    container_name: dementia-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  db-data:
  rag-data:
