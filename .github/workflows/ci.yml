name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -- Setup Python and Backend --
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Backend Dependencies
        run: |
          cd backend
          poetry env use 3.12
          poetry run pip install -r requirements.txt pytest pytest-asyncio semgrep

      # -- Backend Lints --
      - name: Run Backend Security Scan (Semgrep)
        run: |
          cd backend
          poetry run semgrep --config ../.semgrep/rules.yaml --error ../

      # -- Run Backend Tests --
      - name: Run Backend Unit Tests (Pytest)
        run: |
          cd backend
          # Run tests with mock mode enabled and proper PYTHONPATH
          FORCE_MOCK_EVAL=1 PYTHONPATH=$GITHUB_WORKSPACE poetry run pytest

      # -- Setup Node and Frontend --
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      # -- Frontend Lints --
      - name: Run Frontend Lint (ESLint)
        run: |
          cd frontend
          npm run lint

      # -- Run Frontend E2E Tests --
      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Start FastAPI Backend in Background
        run: |
          cd backend
          # Start the backend server in background for E2E tests to talk to
          FORCE_MOCK_EVAL=1 PYTHONPATH=$GITHUB_WORKSPACE poetry run uvicorn app.main:app --port 8000 &
          # Wait a few seconds for server to start
          sleep 5

      - name: Run Playwright E2E Tests
        run: |
          cd frontend
          # Run playwright E2E tests, which will auto-start Vite frontend on port 5173
          npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 15
